name: MeshTCP Tests

on:
  push:
  pull_request:

jobs:
  test:
 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install meshtastic psutil

      - name: Run Layer 1 — Protocol serialization
        run: python -m unittest discover -s tests -p "test_layer1*" -v

      - name: Run Layer 2 — Protocol logic (mocks)
        run: python -m unittest discover -s tests -p "test_layer2*" -v
